name: Lumyn
options:
  bundleIdPrefix: com.whyteboard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"
targets:
  Lumyn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Lumyn
        excludes:
          - Config/Products.storekit
          - Data/**
      - path: LumynShared
    resources:
      - path: Lumyn/Data
      - path: Lumyn/Fonts
      - path: Lumyn/Config/Secrets.plist
        optional: true
      - path: Lumyn/Resources/Assets.xcassets
      - path: Lumyn/PrivacyInfo.xcprivacy
    dependencies:
      - target: LumynWidgetExtension
        embed: true
    info:
      path: Lumyn/Info.plist
      properties:
        CFBundleDisplayName: Lumyn
        UIAppFonts:
          - Fonts/PlayfairDisplay.ttf
          - Fonts/DMSans.ttf
        UILaunchScreen:
          UIColorName: LumynBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSUserNotificationsUsageDescription: "Lumyn can remind you to practice your daily switch word."
    entitlements:
      path: Lumyn/Lumyn.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whyteboard.lumyn
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Y76U82LCJ5
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
  LumynWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LumynWidget
      - path: LumynShared
    entitlements:
      path: LumynWidget/LumynWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whyteboard.lumyn.widget
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Y76U82LCJ5
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lumyn
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        SKIP_INSTALL: YES
schemes:
  Lumyn:
    build:
      targets:
        Lumyn: all
        LumynWidgetExtension: all
    run:
      config: Debug
      storeKitConfiguration: Lumyn/Config/Products.storekit
