name: Supabase Keepalive

on:
  schedule:
    # Sunday + Wednesday 09:00 UTC — resets 7-day free-tier inactivity window
    - cron: "0 9 * * 0,3"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        env:
          SUPABASE_URL: https://dmwsfygtexkrcgjkmafg.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          response=$(curl -s -o /tmp/supabase_ping_body.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "HTTP status: $response"
          cat /tmp/supabase_ping_body.txt

          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Keepalive ping failed"
            exit 1
          fi
